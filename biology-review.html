<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#eef7f1">
  <title>High School Biology Review</title>
  <meta name="description" content="Three quick high-school biology questions with a final scare.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="High School Biology Review">
  <meta property="og:description" content="Try this three-question biology review.">
  <meta property="og:url" content="https://kevin-rgbi.github.io/zployment/biology-review.html">
  <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/School_Laboratory.jpg/1280px-School_Laboratory.jpg">
  <meta property="og:image:secure_url" content="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/School_Laboratory.jpg/1280px-School_Laboratory.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1280">
  <meta property="og:image:height" content="720">
  <meta property="og:image:alt" content="A high school science laboratory">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="High School Biology Review">
  <meta name="twitter:description" content="Three quick biology questions for high-school students.">
  <meta name="twitter:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/School_Laboratory.jpg/1280px-School_Laboratory.jpg">
  <link rel="preload" href="./assets/momo-scare.svg?v=7" as="image" type="image/svg+xml">
  <style>
    :root{color-scheme:light;--ink:#17231d;--muted:#637269;--green:#267a50;--line:#dbe9df}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#f5fbf7,#edf5f0);color:var(--ink)}
    body{min-height:100vh;padding:20px}
    .shell{width:min(680px,100%);margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;margin:4px 0 16px;color:var(--muted);font-size:14px;font-weight:700}
    .brand{display:flex;align-items:center;gap:9px;color:var(--green)}
    .brand-mark{display:grid;place-items:center;width:34px;height:34px;border-radius:11px;background:#dff1e5;font-size:20px}
    .progress{height:9px;border-radius:999px;background:#dfe9e2;overflow:hidden;margin-bottom:18px}
    .progress>div{height:100%;width:33.333%;border-radius:inherit;background:linear-gradient(90deg,#2c8b5b,#58ad7c);transition:width .3s ease}
    .card{background:rgba(255,255,255,.97);border:1px solid var(--line);border-radius:26px;padding:clamp(22px,5vw,36px);box-shadow:0 24px 70px rgba(32,75,50,.12)}
    .eyebrow{margin:0 0 10px;color:var(--green);font-size:13px;font-weight:850;letter-spacing:.08em;text-transform:uppercase}
    h1{margin:0 0 10px;font-size:clamp(28px,7vw,44px);line-height:1.05;letter-spacing:-.04em}
    .sub{margin:0 0 26px;color:var(--muted);font-size:16px;line-height:1.5}
    #question{margin:0 0 20px;font-size:clamp(22px,5vw,31px);line-height:1.25;letter-spacing:-.025em}
    .answers{display:grid;gap:12px}
    .answer{width:100%;border:1px solid #d9e5dc;border-radius:16px;padding:16px 17px;background:#fff;color:var(--ink);text-align:left;font:inherit;font-weight:720;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:transform .12s ease,border-color .12s ease,background .12s ease}
    .answer:active{transform:scale(.988)}
    .answer:focus-visible{outline:3px solid rgba(38,122,80,.28);outline-offset:2px}
    .answer:disabled{cursor:default;opacity:1}
    @media(hover:hover) and (pointer:fine){.answer:not(:disabled):hover{border-color:#8ab79a;background:#f5fbf7}}
    .answer.correct{background:#e7f7ed;border-color:#56a875;color:#165f3b}
    .answer.wrong{background:#fff0f0;border-color:#d78686;color:#8a2a2a}
    .finalizing{display:none;align-items:center;gap:12px;min-height:76px;padding:17px;border:1px solid var(--line);border-radius:16px;background:#f8fbf9;color:var(--muted);font-weight:750}
    .finalizing.visible{display:flex;animation:fadeIn .2s ease both}
    .spinner{width:22px;height:22px;flex:0 0 auto;border:3px solid #d5e7db;border-top-color:var(--green);border-radius:50%;animation:spin .72s linear infinite}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{display:flex;justify-content:space-between;gap:12px;margin-top:20px;color:var(--muted);font-size:13px}
    .result{display:none;text-align:center}
    .result h2{font-size:34px;margin:0 0 10px}
    .result p{color:var(--muted);font-size:17px;line-height:1.5}
    .secondary{border:0;border-radius:999px;padding:14px 20px;background:var(--green);color:#fff;font:inherit;font-weight:800;cursor:pointer}
    .credit{margin:14px 2px 0;color:#7c8b82;font-size:11px;text-align:center}
    #scare{position:fixed;inset:0;display:none;place-items:center;background:#000;z-index:100;overflow:hidden}
    #scare.active{display:grid}
    #scareImage{width:100vw;height:100dvh;min-height:100vh;object-fit:cover;max-width:none;filter:contrast(1.28) saturate(1.12);animation:shock .12s cubic-bezier(.02,.9,.1,1) forwards,shake .052s .12s 15 alternate}
    @keyframes shock{from{transform:scale(.16) rotate(-5deg)}to{transform:scale(1.24) rotate(1deg)}}
    @keyframes shake{from{translate:-18px 11px;rotate:-1.8deg}to{translate:18px -11px;rotate:1.8deg}}
    #continuePanel{position:fixed;left:16px;right:16px;bottom:max(18px,env(safe-area-inset-bottom));z-index:110;display:none;max-width:420px;margin:0 auto;padding:16px;border-radius:20px;background:rgba(8,8,10,.9);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(14px);box-shadow:0 18px 58px rgba(0,0,0,.58)}
    #continuePanel button{width:100%;appearance:none;border:0;border-radius:999px;padding:15px 18px;background:#fff;color:#111;font:inherit;font-weight:850;cursor:pointer}
    @media(max-width:480px){body{padding:14px}.card{border-radius:22px}.footer{font-size:12px}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="brand"><span class="brand-mark">🧬</span><span>Biology Review</span></div>
      <span id="counter">Question 1 of 3</span>
    </div>
    <div class="progress"><div id="progressFill"></div></div>
    <main class="card">
      <section id="quiz">
        <p class="eyebrow">High School Biology</p>
        <h1>Three-question review</h1>
        <p class="sub">Choose the best answer for each question. Your score appears at the end.</p>
        <h2 id="question"></h2>
        <div id="answers" class="answers"></div>
        <div id="finalizing" class="finalizing" role="status" aria-live="polite"><span class="spinner" aria-hidden="true"></span><span>Calculating your result…</span></div>
        <div class="footer"><span>Cells • Ribosomes • DNA</span><span>No sign-in required</span></div>
      </section>
      <section id="result" class="result">
        <p class="eyebrow">Review complete</p>
        <h2 id="scoreText"></h2>
        <p id="scoreNote"></p>
        <button class="secondary" id="restart">Try again</button>
      </section>
    </main>
    <p class="credit">Preview photo: Farhang Amini / Wikimedia Commons, CC BY-SA 4.0</p>
  </div>

  <section id="scare" aria-hidden="true"><img id="scareImage" src="./assets/momo-scare.svg?v=7" alt="" decoding="sync" fetchpriority="high"></section>
  <section id="continuePanel"><button id="continueButton" type="button">Continue to score</button></section>

  <script>
    const questions=[
      {q:'Which structure controls what enters and leaves a cell?',a:['Cell membrane','Nucleus','Ribosome','Mitochondrion'],correct:0},
      {q:'What is the primary function of ribosomes?',a:['Store genetic information','Build proteins from amino acids','Produce ATP through respiration','Break down cellular waste'],correct:1},
      {q:'Which molecule stores most hereditary information in living organisms?',a:['Glucose','ATP','DNA','Protein'],correct:2}
    ];
    const total=questions.length;
    const questionEl=document.getElementById('question');
    const answersEl=document.getElementById('answers');
    const finalizing=document.getElementById('finalizing');
    const counter=document.getElementById('counter');
    const progressFill=document.getElementById('progressFill');
    const quiz=document.getElementById('quiz');
    const result=document.getElementById('result');
    const scoreText=document.getElementById('scoreText');
    const scoreNote=document.getElementById('scoreNote');
    const scare=document.getElementById('scare');
    const scareImage=document.getElementById('scareImage');
    const continuePanel=document.getElementById('continuePanel');
    let current=0,score=0,locked=false,audioContext;
    let timers=[];

    scareImage.decode?.().catch(()=>{});
    function schedule(fn,delay){timers.push(setTimeout(fn,delay))}
    function clearTimers(){timers.forEach(clearTimeout);timers=[]}
    function ensureAudio(){
      if(!audioContext) audioContext=new (window.AudioContext||window.webkitAudioContext)();
      if(audioContext.state==='suspended') audioContext.resume();
    }
    function playScareSound(){
      ensureAudio();
      const now=audioContext.currentTime;
      const master=audioContext.createGain();
      master.gain.setValueAtTime(.0001,now);
      master.gain.exponentialRampToValueAtTime(.9,now+.01);
      master.gain.exponentialRampToValueAtTime(.0001,now+1.2);
      master.connect(audioContext.destination);
      const high=audioContext.createOscillator();
      const low=audioContext.createOscillator();
      high.type='sawtooth';low.type='square';
      high.frequency.setValueAtTime(1450,now);high.frequency.exponentialRampToValueAtTime(105,now+1.05);
      low.frequency.setValueAtTime(520,now);low.frequency.exponentialRampToValueAtTime(58,now+1.1);
      const hg=audioContext.createGain(),lg=audioContext.createGain();
      hg.gain.value=.5;lg.gain.value=.34;
      high.connect(hg).connect(master);low.connect(lg).connect(master);
      high.start(now);high.stop(now+1.1);low.start(now);low.stop(now+1.15);
      const length=Math.floor(audioContext.sampleRate*1.05);
      const buffer=audioContext.createBuffer(1,length,audioContext.sampleRate);
      const data=buffer.getChannelData(0);
      for(let i=0;i<length;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/length,1.35);
      const noise=audioContext.createBufferSource();
      const ng=audioContext.createGain();ng.gain.value=.5;
      noise.buffer=buffer;noise.connect(ng).connect(master);noise.start(now);noise.stop(now+1.05);
    }
    function resetQuestionView(){
      finalizing.classList.remove('visible');
      questionEl.style.display='block';
      answersEl.style.display='grid';
    }
    function render(){
      locked=false;
      resetQuestionView();
      const item=questions[current];
      counter.textContent=`Question ${current+1} of ${total}`;
      progressFill.style.width=`${((current+1)/total)*100}%`;
      questionEl.textContent=item.q;
      answersEl.innerHTML='';
      item.a.forEach((label,index)=>{
        const button=document.createElement('button');
        button.type='button';button.className='answer';button.textContent=label;
        button.addEventListener('click',()=>select(index,button));
        answersEl.appendChild(button);
      });
    }
    function select(index,button){
      if(locked)return;
      locked=true;button.blur();ensureAudio();
      const item=questions[current];
      if(index===item.correct){score++;button.classList.add('correct')}else button.classList.add('wrong');
      [...answersEl.children].forEach((btn,i)=>{btn.disabled=true;if(i===item.correct)btn.classList.add('correct')});
      if(current===total-1){
        schedule(()=>{questionEl.style.display='none';answersEl.style.display='none';counter.textContent='Finalizing';finalizing.classList.add('visible')},650);
        schedule(triggerScare,1650);
      }else schedule(()=>{current++;render()},620);
    }
    function triggerScare(){
      playScareSound();
      scare.classList.add('active');
      scare.setAttribute('aria-hidden','false');
      if(navigator.vibrate)navigator.vibrate([220,45,300]);
      schedule(()=>{continuePanel.style.display='block'},2100);
    }
    function showResult(){
      clearTimers();
      scare.classList.remove('active');
      scare.setAttribute('aria-hidden','true');
      continuePanel.style.display='none';
      resetQuestionView();
      quiz.style.display='none';result.style.display='block';
      counter.textContent='Complete';progressFill.style.width='100%';
      scoreText.textContent=`${score} out of ${total}`;
      scoreNote.textContent=score===total?'Perfect score. You got all three biology questions correct.':score>=2?'Strong result. You understand the core concepts.':'Review cell structures, ribosomes, and DNA, then try again.';
    }
    document.getElementById('continueButton').addEventListener('click',showResult);
    document.getElementById('restart').addEventListener('click',()=>{
      clearTimers();current=0;score=0;locked=false;
      result.style.display='none';quiz.style.display='block';continuePanel.style.display='none';
      scare.classList.remove('active');scare.setAttribute('aria-hidden','true');render();
    });
    render();
  </script>
</body>
</html>
