<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f7fb" />
  <title>Visual Focus Check</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { background: #f5f7fb; color: #172033; }
    main { min-height: 100%; display: grid; place-items: center; padding: 24px; }
    .card { width: min(560px, 100%); background: white; border: 1px solid #e5e9f2; border-radius: 24px; padding: 28px; box-shadow: 0 18px 60px rgba(25, 42, 70, .12); text-align: center; }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 7vw, 44px); letter-spacing: -.04em; }
    p { margin: 0 auto 22px; max-width: 42ch; color: #5a6578; line-height: 1.5; }
    button { appearance: none; border: 0; border-radius: 999px; padding: 15px 24px; font: inherit; font-weight: 750; background: #172033; color: white; cursor: pointer; min-width: 170px; }
    button:active { transform: scale(.98); }
    .small { font-size: 13px; margin-top: 15px; color: #7a8496; }
    #test { position: fixed; inset: 0; display: none; background: #f5f7fb; }
    #field { position: absolute; inset: 0; }
    #dot { position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #172033; transform: translate(-50%, -50%); transition: left 1.15s ease-in-out, top 1.15s ease-in-out; box-shadow: 0 0 0 8px rgba(23,32,51,.08); }
    #instruction { position: absolute; top: max(26px, env(safe-area-inset-top)); left: 0; right: 0; text-align: center; color: #5a6578; font-weight: 650; padding: 0 20px; }
    #timer { position: absolute; bottom: max(28px, env(safe-area-inset-bottom)); left: 0; right: 0; text-align: center; font-size: 14px; color: #8992a3; }
    #scare { position: fixed; inset: 0; display: none; place-items: center; background: #050505; z-index: 10; }
    #face { width: min(96vw, 720px); height: auto; filter: drop-shadow(0 0 26px rgba(255,255,255,.18)); transform: scale(.72); animation: lunge .18s cubic-bezier(.2,.9,.2,1) forwards; }
    @keyframes lunge { to { transform: scale(1.22); } }
    #again { position: fixed; bottom: max(22px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 11; display: none; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.35); backdrop-filter: blur(8px); }
  </style>
</head>
<body>
  <main id="start">
    <section class="card">
      <h1>Visual Focus Check</h1>
      <p>Follow the moving dot with your eyes for 30 seconds. Try not to look away until the test finishes.</p>
      <button id="begin">Begin test</button>
      <div class="small">Sound on • No camera or sign-in required</div>
    </section>
  </main>

  <section id="test" aria-live="polite">
    <div id="instruction">Keep your eyes on the dot</div>
    <div id="field"><div id="dot"></div></div>
    <div id="timer">Calibrating…</div>
  </section>

  <section id="scare" aria-hidden="true">
    <svg id="face" viewBox="0 0 800 800" role="img" aria-label="A sudden stylized horror face">
      <defs>
        <radialGradient id="skin" cx="50%" cy="40%" r="60%">
          <stop offset="0" stop-color="#fafafa"/>
          <stop offset=".65" stop-color="#bfc2c8"/>
          <stop offset="1" stop-color="#555860"/>
        </radialGradient>
        <filter id="rough">
          <feTurbulence type="fractalNoise" baseFrequency=".025" numOctaves="3" seed="4" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="22"/>
        </filter>
      </defs>
      <path d="M164 122 Q400 20 636 122 L700 378 Q686 652 400 768 Q114 652 100 378Z" fill="url(#skin)" filter="url(#rough)"/>
      <path d="M160 270 Q260 170 340 294 Q260 372 154 322Z" fill="#020202"/>
      <path d="M640 270 Q540 170 460 294 Q540 372 646 322Z" fill="#020202"/>
      <circle cx="257" cy="286" r="21" fill="#f7f7f7"/>
      <circle cx="543" cy="286" r="21" fill="#f7f7f7"/>
      <circle cx="257" cy="286" r="9" fill="#050505"/>
      <circle cx="543" cy="286" r="9" fill="#050505"/>
      <path d="M386 310 Q353 445 400 474 Q447 445 414 310" fill="#686b72"/>
      <path d="M214 493 Q400 395 586 493 Q560 703 400 724 Q240 703 214 493Z" fill="#070707"/>
      <path d="M246 505 Q400 460 554 505" stroke="#f1f1f1" stroke-width="30" stroke-linecap="round" stroke-dasharray="34 12"/>
      <path d="M265 647 Q400 690 535 647" stroke="#d8d8d8" stroke-width="24" stroke-linecap="round" stroke-dasharray="30 13"/>
      <path d="M160 210 Q250 104 344 218" stroke="#202126" stroke-width="35" fill="none"/>
      <path d="M640 210 Q550 104 456 218" stroke="#202126" stroke-width="35" fill="none"/>
    </svg>
  </section>
  <button id="again">Try again</button>

  <script>
    const begin = document.getElementById('begin');
    const start = document.getElementById('start');
    const test = document.getElementById('test');
    const dot = document.getElementById('dot');
    const timer = document.getElementById('timer');
    const scare = document.getElementById('scare');
    const again = document.getElementById('again');
    let audioContext;
    let moveInterval;
    let countdownInterval;

    function moveDot() {
      const pad = 45;
      const x = pad + Math.random() * Math.max(1, innerWidth - pad * 2);
      const y = 95 + Math.random() * Math.max(1, innerHeight - 190);
      dot.style.left = `${x}px`;
      dot.style.top = `${y}px`;
    }

    function scheduleSound(ctx, when) {
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, when);
      master.gain.exponentialRampToValueAtTime(0.65, when + 0.018);
      master.gain.exponentialRampToValueAtTime(0.0001, when + 1.25);
      master.connect(ctx.destination);
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      osc1.type = 'sawtooth';
      osc2.type = 'square';
      osc1.frequency.setValueAtTime(880, when);
      osc1.frequency.exponentialRampToValueAtTime(115, when + 1.1);
      osc2.frequency.setValueAtTime(1320, when);
      osc2.frequency.exponentialRampToValueAtTime(170, when + 1.0);
      const g1 = ctx.createGain();
      const g2 = ctx.createGain();
      g1.gain.value = 0.42;
      g2.gain.value = 0.18;
      osc1.connect(g1).connect(master);
      osc2.connect(g2).connect(master);
      osc1.start(when); osc1.stop(when + 1.25);
      osc2.start(when); osc2.stop(when + 1.05);
      const length = Math.floor(ctx.sampleRate * 1.15);
      const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) {
        const env = Math.pow(1 - i / length, 1.7);
        data[i] = (Math.random() * 2 - 1) * env;
      }
      const noise = ctx.createBufferSource();
      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.34;
      noise.buffer = buffer;
      noise.connect(noiseGain).connect(master);
      noise.start(when); noise.stop(when + 1.15);
    }

    function triggerScare() {
      clearInterval(moveInterval);
      clearInterval(countdownInterval);
      test.style.display = 'none';
      scare.style.display = 'grid';
      scare.setAttribute('aria-hidden', 'false');
      if (navigator.vibrate) navigator.vibrate([170, 40, 220]);
      setTimeout(() => { again.style.display = 'block'; }, 1800);
    }

    function runTest() {
      again.style.display = 'none';
      scare.style.display = 'none';
      scare.setAttribute('aria-hidden', 'true');
      start.style.display = 'none';
      test.style.display = 'block';
      moveDot();
      moveInterval = setInterval(moveDot, 1200);
      let seconds = 30;
      timer.textContent = `${seconds} seconds remaining`;
      countdownInterval = setInterval(() => {
        seconds -= 1;
        timer.textContent = seconds > 0 ? `${seconds} seconds remaining` : 'Analyzing…';
      }, 1000);
      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === 'suspended') audioContext.resume();
      scheduleSound(audioContext, audioContext.currentTime + 30);
      setTimeout(triggerScare, 30000);
    }

    begin.addEventListener('click', runTest);
    again.addEventListener('click', runTest);
  </script>
</body>
</html>
