<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7fb">
  <title>Visual Focus Check</title>
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#f5f7fb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    iframe{display:block;width:100%;height:100%;border:0}
    #poll{position:fixed;left:18px;right:18px;bottom:max(22px,env(safe-area-inset-bottom));z-index:20;display:none;max-width:520px;margin:0 auto;padding:18px;border-radius:22px;background:rgba(10,10,10,.88);color:#fff;text-align:center;border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(12px);box-shadow:0 16px 50px rgba(0,0,0,.45)}
    h2{margin:0 0 14px;font-size:22px}
    #buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    button{appearance:none;border:0;border-radius:999px;padding:15px 18px;color:#fff;font:inherit;font-weight:800;cursor:pointer}
    button:active{transform:scale(.98)}
    #yes{background:#1f9d55}
    #no{background:#d9363e}
    #result{display:none;margin:2px 0;font-size:18px;font-weight:800}
  </style>
</head>
<body>
  <iframe id="testFrame" src="./visual-check.html?v=5" title="Visual Focus Check" allow="autoplay"></iframe>
  <section id="poll" aria-live="polite">
    <h2 id="question">Did it scare you?</h2>
    <div id="buttons">
      <button id="yes">Yes</button>
      <button id="no">No</button>
    </div>
    <div id="result"></div>
  </section>
  <script>
    const frame=document.getElementById('testFrame');
    const poll=document.getElementById('poll');
    const question=document.getElementById('question');
    const buttons=document.getElementById('buttons');
    const result=document.getElementById('result');

    function showPoll(){
      setTimeout(()=>{poll.style.display='block'},1600);
    }

    frame.addEventListener('load',()=>{
      try{
        const doc=frame.contentDocument;
        const scare=doc.getElementById('scare');
        if(!scare)return;
        new MutationObserver(()=>{
          if(getComputedStyle(scare).display!=='none')showPoll();
        }).observe(scare,{attributes:true,attributeFilter:['style']});
      }catch(_){ }
    });

    function answer(value){
      question.style.display='none';
      buttons.style.display='none';
      result.style.display='block';
      result.textContent=value==='yes'?'Yes — it got me.':'No — I was not scared.';
      try{localStorage.setItem('focus-vote',value)}catch(_){ }
    }

    document.getElementById('yes').addEventListener('click',()=>answer('yes'));
    document.getElementById('no').addEventListener('click',()=>answer('no'));
  </script>
</body>
</html>
