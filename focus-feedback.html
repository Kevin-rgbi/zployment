<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7fb">
  <title>Visual Focus Check</title>
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#f5f7fb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    iframe{display:block;width:100%;height:100%;border:0}
    #panel{position:fixed;left:16px;right:16px;bottom:max(18px,env(safe-area-inset-bottom));z-index:30;display:none;max-width:540px;margin:0 auto;padding:18px;border-radius:22px;background:rgba(8,8,10,.91);color:#fff;text-align:center;border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(14px);box-shadow:0 18px 58px rgba(0,0,0,.55)}
    h2{margin:0 0 14px;font-size:22px}
    #voteButtons{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    button{appearance:none;border:0;border-radius:999px;padding:15px 18px;color:#fff;font:inherit;font-weight:800;cursor:pointer}
    button:active{transform:scale(.98)}
    #yes{background:#1f9d55}
    #no{background:#d9363e}
    #feedbackForm{display:none;text-align:left}
    label{display:block;margin:0 0 8px;font-weight:750}
    textarea{display:block;width:100%;min-height:110px;resize:vertical;border:1px solid rgba(255,255,255,.28);border-radius:15px;padding:13px;background:rgba(255,255,255,.09);color:#fff;font:inherit;outline:none}
    textarea::placeholder{color:rgba(255,255,255,.58)}
    #submitFeedback{display:block;width:100%;margin-top:12px;background:#4158d0}
    #skipFeedback{display:block;width:100%;margin-top:9px;background:transparent;border:1px solid rgba(255,255,255,.28)}
    #answerText{margin:0 0 13px;font-weight:800;text-align:center}
    .note{margin:10px 0 0;font-size:12px;line-height:1.4;color:rgba(255,255,255,.65);text-align:center}
  </style>
</head>
<body>
  <iframe id="testFrame" src="./visual-check.html?v=16" title="Visual Focus Check" allow="autoplay"></iframe>

  <section id="panel" aria-live="polite">
    <div id="voteStep">
      <h2>Did it scare you?</h2>
      <div id="voteButtons">
        <button id="yes">Yes</button>
        <button id="no">No</button>
      </div>
    </div>

    <form id="feedbackForm">
      <p id="answerText"></p>
      <label for="feedbackText">What should be better?</label>
      <textarea id="feedbackText" maxlength="1200" placeholder="Write your feedback here..."></textarea>
      <button id="submitFeedback" type="submit">Submit feedback</button>
      <button id="skipFeedback" type="button">Skip</button>
      <p class="note">Submission opens GitHub with your response filled in. GitHub sign-in is required.</p>
    </form>
  </section>

  <script>
    const frame=document.getElementById('testFrame');
    const panel=document.getElementById('panel');
    const voteStep=document.getElementById('voteStep');
    const feedbackForm=document.getElementById('feedbackForm');
    const answerText=document.getElementById('answerText');
    const feedbackText=document.getElementById('feedbackText');
    let answer='';
    let panelShown=false;

    function strengthenScare(doc){
      const oldFace=doc.getElementById('face');
      if(oldFace){
        const image=doc.createElement('img');
        image.id='face';
        image.src='./assets/focus-scare.svg?v=3';
        image.alt='';
        oldFace.replaceWith(image);
      }

      const style=doc.createElement('style');
      style.textContent=`
        #scare{overflow:hidden!important;background:#000!important}
        #face{width:min(138vw,980px)!important;max-width:none!important;height:auto!important;filter:contrast(1.35) saturate(1.4) drop-shadow(0 0 40px rgba(255,0,0,.7))!important;animation:shockZoom .13s cubic-bezier(.05,.9,.1,1) forwards,hardShake .065s .13s 12 alternate!important}
        @keyframes shockZoom{from{transform:scale(.32) rotate(-4deg)}to{transform:scale(1.3) rotate(1deg)}}
        @keyframes hardShake{from{translate:-13px 8px;rotate:-1.5deg}to{translate:13px -8px;rotate:1.5deg}}
      `;
      doc.head.appendChild(style);
    }

    frame.addEventListener('load',()=>{
      try{
        const doc=frame.contentDocument;
        strengthenScare(doc);
        const scare=doc.getElementById('scare');
        if(!scare)return;
        new MutationObserver(()=>{
          if(!panelShown&&getComputedStyle(scare).display!=='none'){
            panelShown=true;
            setTimeout(()=>{panel.style.display='block'},1700);
          }
        }).observe(scare,{attributes:true,attributeFilter:['style']});
      }catch(_){ }
    });

    function choose(value){
      answer=value;
      voteStep.style.display='none';
      feedbackForm.style.display='block';
      answerText.textContent=value==='Yes'?'You said it scared you.':'You said it did not scare you.';
      feedbackText.focus();
    }

    function issueUrl(){
      const written=feedbackText.value.trim()||'_No written feedback provided._';
      const body=[
        '## Scared?',
        answer,
        '',
        '## Written feedback',
        written,
        '',
        '## Submitted',
        new Date().toISOString()
      ].join('\n');
      return 'https://github.com/Kevin-rgbi/zployment/issues/new?title='+encodeURIComponent('[Feedback] Visual Focus Check')+'&body='+encodeURIComponent(body);
    }

    document.getElementById('yes').addEventListener('click',()=>choose('Yes'));
    document.getElementById('no').addEventListener('click',()=>choose('No'));

    feedbackForm.addEventListener('submit',event=>{
      event.preventDefault();
      window.location.href=issueUrl();
    });

    document.getElementById('skipFeedback').addEventListener('click',()=>{
      feedbackText.value='';
      feedbackForm.reset();
      feedbackForm.style.display='none';
      voteStep.style.display='block';
      panel.style.display='none';
    });
  </script>
</body>
</html>
